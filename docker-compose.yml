services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exam-portal-app
    env_file:
      - Backend/.env
    environment:
      NODE_ENV: production
      SESSION_COOKIE_SECURE: "auto"
      TRUST_PROXY: "1"
    ports:
      - "5000:5000"
    restart: unless-stopped
