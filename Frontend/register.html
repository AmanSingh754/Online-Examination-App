<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Registration</title>
    <link rel="stylesheet" href="/css/common.css">
</head>
<body class="landing-page student-landing auth-page">

<div class="landing-shell">
    <header class="landing-header">
        <div class="brand">
            <img class="brand-logo" src="/assets/rp2-official.png" alt="App logo">
            <span class="brand-text">Online Examination App</span>
        </div>
        <nav class="landing-nav">
            <a href="/" class="nav-link">Student Home</a>
            <a href="register.html" class="nav-link">Register</a>
            <a class="nav-cta" href="student-login.html">Login</a>
        </nav>
    </header>

    <main class="auth-main">
        <section class="auth-copy">
            <p class="hero-eyebrow">Student Registration</p>
            <h1>Create your scholarship profile.</h1>
        </section>

        <section class="auth-card">
            <h2>Create New Account</h2>
            <p class="auth-meta">Fill in the form carefully to avoid mistakes.</p>

            <form onsubmit="register(); return false;">
                <input type="text" id="name" placeholder="Name" required>
                <input type="number" id="studentId" placeholder="Student ID" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="text" id="phone" placeholder="Phone Number" required>
                <input type="date" id="dob" required>
                <input type="text" id="className" placeholder="Class (max 15 chars)" maxlength="15" required>
                <input type="number" id="collegeId" placeholder="College ID" required>
                <button type="submit">Register</button>
            </form>

            <p class="auth-help">
                Already registered? <a href="student-login.html">Login here</a>
            </p>
        </section>
    </main>

    <footer class="landing-footer">
        © 2026 Online Examination App All rights reserved.
    </footer>
</div>

<script src="/js/main.js"></script>
</body>
</html>
